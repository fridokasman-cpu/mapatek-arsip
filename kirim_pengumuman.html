<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirim Pengumuman WhatsApp</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { max-width: 600px; width: 100%; background: white; border-radius: 16px; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; color: #075e54; display: flex; align-items: center; gap: 10px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 6px; color: #333; }
        input, textarea, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; transition: border-color 0.3s; }
        input:focus, textarea:focus, select:focus { border-color: #25D366; outline: none; }
        textarea { resize: vertical; min-height: 120px; }
        .btn { background: #25D366; color: white; border: none; padding: 14px 28px; border-radius: 40px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.3s; width: 100%; }
        .btn:hover { background: #128C7E; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        #waStatus { margin-top: 16px; padding: 12px; border-radius: 8px; display: none; font-weight: 500; }
        .success { background: #d4edda; color: #155724; display: block !important; }
        .error { background: #f8d7da; color: #721c24; display: block !important; }
        .info { background: #cce5ff; color: #004085; display: block !important; }
        .hint { font-size: 13px; color: #666; margin-top: 4px; }
        .footer { margin-top: 20px; text-align: center; font-size: 13px; color: #888; }
    </style>
</head>
<body>
    <div class="card">
        <h2><i class="fab fa-whatsapp" style="color:#25D366;"></i> Kirim Pengumuman</h2>
        <p style="color:#555; margin-bottom: 20px;">Kirim pesan ke grup WhatsApp atau ke nomor pribadi anggota.</p>

        <form id="whatsappForm">
            <div class="form-group">
                <label for="targetType">📱 Target</label>
                <select id="targetType">
                    <option value="group">Grup WhatsApp</option>
                    <option value="personal">Nomor Pribadi</option>
                </select>
            </div>

            <div class="form-group">
                <label for="target">ID / Nomor</label>
                <input type="text" id="target" placeholder="ID Grup atau Nomor HP">
                <div class="hint" id="targetHint">ID Grup dari dashboard Fonnte (contoh: grup_xxxxx)</div>
            </div>

            <div class="form-group">
                <label for="message">✏️ Isi Pesan</label>
                <textarea id="message" placeholder="Tulis pengumuman..."></textarea>
            </div>

            <button type="submit" class="btn" id="sendBtn">
                <i class="fab fa-whatsapp"></i> Kirim Pengumuman
            </button>
        </form>

        <div id="waStatus"></div>
        <div class="footer">Powered by Fonnte + Pipedream</div>
    </div>

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Load send_whatsapp.js -->
    <script src="js/send_whatsapp.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('whatsappForm');
            const targetInput = document.getElementById('target');
            const targetType = document.getElementById('targetType');
            const targetHint = document.getElementById('targetHint');
            const statusDiv = document.getElementById('waStatus');

            // Set default target (isi dengan ID grup atau nomor Anda)
            targetInput.value = 'grup_xxxxx'; // Ganti dengan ID grup asli

            targetType.addEventListener('change', function() {
                if (this.value === 'group') {
                    targetInput.placeholder = 'Masukkan ID Grup (contoh: grup_xxxxx)';
                    targetHint.textContent = 'ID Grup dari dashboard Fonnte (menu Buku Telepon)';
                } else {
                    targetInput.placeholder = 'Masukkan nomor HP (contoh: 6281234567890)';
                    targetHint.textContent = 'Gunakan format tanpa spasi atau tanda +';
                }
            });

            form.addEventListener('submit', async function(e) {
                e.preventDefault();

                const target = targetInput.value.trim();
                const message = document.getElementById('message').value.trim();
                const sendBtn = document.getElementById('sendBtn');

                if (!target || !message) {
                    statusDiv.className = 'error';
                    statusDiv.textContent = '⚠️ Target dan pesan harus diisi!';
                    return;
                }

                sendBtn.disabled = true;
                sendBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Mengirim...';
                statusDiv.className = 'info';
                statusDiv.textContent = '🔄 Mengirim pesan...';

                // Panggil fungsi dari send_whatsapp.js
                const result = await sendWhatsApp(target, message);

                if (result.status === 'success') {
                    statusDiv.className = 'success';
                    statusDiv.textContent = '✅ Pesan berhasil dikirim!';
                    document.getElementById('message').value = '';
                } else {
                    statusDiv.className = 'error';
                    statusDiv.textContent = '❌ ' + (result.message || 'Gagal mengirim');
                }

                sendBtn.disabled = false;
                sendBtn.innerHTML = '<i class="fab fa-whatsapp"></i> Kirim Pengumuman';
            });
        });
    </script>
</body>
</html>
