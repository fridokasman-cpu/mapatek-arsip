<!-- Form Kirim Pengumuman ke Grup -->
<div class="card" style="max-width: 600px; margin: 2rem auto; padding: 2rem; background: #f9f9f9; border-radius: 12px;">
    <h3>📢 Kirim Pengumuman ke Grup WhatsApp</h3>
    <p style="color: #666; font-size: 0.9rem;">Pesan akan dikirim ke grup <strong>ANGGOTA MUDA MAPATEK ABHIPRAYA 2025</strong></p>
    
    <div style="margin-bottom: 1rem;">
        <label>Isi Pesan:</label>
        <textarea id="waMessage" rows="4" placeholder="Tulis pengumuman..." style="width:100%; padding:0.75rem; border-radius:8px; border:1px solid #ddd;"></textarea>
    </div>
    
    <button onclick="kirimKeGrup()" style="background: #25D366; color: white; padding: 0.75rem 2rem; border: none; border-radius: 40px; cursor: pointer; font-weight: 600;">
        <i class="fab fa-whatsapp"></i> Kirim ke Grup
    </button>
    
    <div id="waStatus" style="margin-top: 1rem; font-weight: 500;"></div>
</div>
