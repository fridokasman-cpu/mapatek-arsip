<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>🗺️ Peta Pendakian MAPATEK</title>

    <!-- Leaflet & Plugin CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.fullscreen/2.0.0/Control.FullScreen.css" />
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <style>
        /* ========== RESET & GLOBAL ========== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            overflow: hidden;
            height: 100vh;
            touch-action: pan-x pan-y;
        }
        #map {
            height: 100vh;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        /* ========== HEADER ========== */
        .map-header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding: 12px 16px;
            background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 100%);
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
        }
        .map-header h1 {
            font-size: 16px;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 2px 20px rgba(0,0,0,0.5);
            pointer-events: none;
        }
        .map-header h1 i { color: #10b981; margin-right: 8px; }
        .header-btn {
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.15);
            color: #fff;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            pointer-events: auto;
            transition: all 0.2s;
        }
        .header-btn:hover { background: rgba(255,255,255,0.25); }

        /* ========== GPS STATUS ========== */
        .gps-status {
            position: absolute;
            top: 70px;
            right: 12px;
            z-index: 1000;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 10px 14px;
            font-size: 12px;
            color: #ccc;
            min-width: 150px;
            display: none;
            pointer-events: none;
        }
        .gps-status.active { display: block; }
        .gps-status .dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
            vertical-align: middle;
        }
        .gps-status .dot.on { background: #10b981; animation: pulse-dot 1.5s infinite; }
        .gps-status .dot.off { background: #ef4444; }
        .gps-status .accuracy { font-size: 10px; color: #888; margin-top: 4px; }
        @keyframes pulse-dot {
            0%,100% { opacity:1; transform:scale(1); }
            50% { opacity:0.4; transform:scale(0.7); }
        }

        /* ========== STATS ========== */
        .stats-panel {
            position: absolute;
            top: 70px;
            left: 12px;
            z-index: 1000;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 10px 14px;
            font-size: 12px;
            color: #ccc;
            min-width: 120px;
            display: none;
        }
        .stats-panel.active { display: block; }
        .stats-panel .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 2px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .stats-panel .stat-item:last-child { border-bottom: none; }
        .stats-panel .stat-value { color: #10b981; font-weight: 600; }
        .stats-panel .stat-label { color: #888; font-size: 11px; }

        /* ========== BOTTOM CONTROLS ========== */
        .map-controls {
            position: absolute;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 12px 14px;
            border-radius: 20px;
            max-width: 96%;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
        }
        .map-controls button {
            flex: 0 0 auto;
            padding: 10px 14px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            background: rgba(255,255,255,0.08);
            color: #ccc;
            transition: all 0.2s;
            min-height: 44px;
            min-width: 44px;
            justify-content: center;
            touch-action: manipulation;
        }
        .map-controls button:active { transform: scale(0.94); }
        .map-controls button i { font-size: 18px; }

        .btn-gps { background: #0ea5e9; color: #fff; }
        .btn-gps:hover { background: #0284c7; }

        .btn-track { background: #10b981; color: #fff; }
        .btn-track:hover { background: #059669; }
        .btn-track.active { background: #ef4444; animation: pulse-btn 1.5s infinite; }

        .btn-compass { background: #06b6d4; color: #fff; }
        .btn-compass:hover { background: #0891b2; }

        .btn-save { background: #8b5cf6; color: #fff; }
        .btn-save:hover { background: #7c3aed; }

        .btn-export { background: #f59e0b; color: #1a1a2e; }
        .btn-export:hover { background: #d97706; }

        .btn-draw { background: #ec4899; color: #fff; }
        .btn-draw:hover { background: #db2777; }

        .btn-clear { background: #6b7280; color: #fff; }
        .btn-clear:hover { background: #4b5563; }

        @keyframes pulse-btn {
            0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); }
            50% { box-shadow: 0 0 0 12px rgba(239,68,68,0); }
        }

        /* ========== TOAST ========== */
        .toast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            padding: 12px 24px;
            border-radius: 14px;
            font-size: 14px;
            opacity: 0;
            transition: all 0.4s ease;
            pointer-events: none;
            text-align: center;
            max-width: 90%;
        }
        .toast.show { opacity: 1; bottom: 100px; }
        .toast.success { border-left: 4px solid #10b981; }
        .toast.error { border-left: 4px solid #ef4444; }
        .toast.warning { border-left: 4px solid #f59e0b; }

        /* ========== MODAL ========== */
        .modal-overlay {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            z-index: 9998;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: #1a1a2e;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 30px;
            max-width: 400px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .modal-content h2 { font-size: 18px; margin-bottom: 16px; color: #fff; }
        .modal-content p { color: #aaa; line-height: 1.6; font-size: 14px; }
        .modal-content .close-btn {
            float: right;
            background: none;
            border: none;
            color: #888;
            font-size: 24px;
            cursor: pointer;
        }
        .modal-content .close-btn:hover { color: #fff; }
        .modal-btn {
            padding: 14px;
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            font-size: 15px;
            width: 100%;
            transition: all 0.2s;
        }
        .modal-btn:hover { transform: scale(1.02); opacity: 0.9; }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 768px) {
            .map-header h1 { font-size: 14px; }
            .gps-status { top: 60px; right: 8px; padding: 6px 10px; font-size: 11px; min-width: 100px; }
            .stats-panel { top: 60px; left: 8px; padding: 6px 10px; font-size: 11px; min-width: 90px; }
            .map-controls {
                padding: 10px 12px;
                gap: 6px;
                bottom: 12px;
            }
            .map-controls button {
                padding: 8px 10px;
                font-size: 12px;
                min-height: 40px;
                min-width: 40px;
            }
            .map-controls button i { font-size: 16px; }
            .toast { bottom: 80px; font-size: 13px; padding: 10px 18px; }
            .toast.show { bottom: 90px; }
        }
        @media (max-width: 480px) {
            .map-controls button {
                padding: 6px 8px;
                font-size: 10px;
                min-height: 36px;
                min-width: 36px;
            }
            .map-controls button i { font-size: 14px; }
            .map-controls button span { display: none; }
            .map-controls {
                gap: 4px;
                padding: 6px 8px;
                border-radius: 16px;
            }
            .map-header h1 { font-size: 12px; }
        }

        /* ========== SCROLLBAR ========== */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #1a1a2e; }
        ::-webkit-scrollbar-thumb { background: #10b981; border-radius: 4px; }

        /* Override Leaflet Draw toolbar to match dark theme */
        .leaflet-draw-toolbar a { background-color: rgba(0,0,0,0.8) !important; }
        .leaflet-draw-toolbar a:hover { background-color: #10b981 !important; }
        .leaflet-control-fullscreen a { background-color: rgba(0,0,0,0.7) !important; color: #fff !important; }
    </style>
</head>
<body>

    <!-- MAP -->
    <div id="map"></div>

    <!-- HEADER -->
    <div class="map-header">
        <h1><i class="fas fa-mountain"></i> Peta Pendakian MAPATEK</h1>
        <div style="display:flex; gap:8px; pointer-events:auto;">
            <button onclick="toggleFullscreen()" class="header-btn" title="Layar penuh (F)"><i class="fas fa-expand"></i></button>
            <button onclick="window.location.href='index.html'" class="header-btn" title="Beranda"><i class="fas fa-home"></i></button>
        </div>
    </div>

    <!-- GPS STATUS -->
    <div class="gps-status" id="gpsStatus">
        <span class="dot off" id="gpsDot"></span>
        <span class="label" id="gpsText">Menunggu GPS...</span>
        <div class="accuracy" id="gpsAccuracy"></div>
    </div>

    <!-- STATS -->
    <div class="stats-panel" id="statsPanel">
        <div class="stat-item"><span class="stat-label">📍 Titik</span><span class="stat-value" id="statPoints">0</span></div>
        <div class="stat-item"><span class="stat-label">📏 Jarak</span><span class="stat-value" id="statDistance">0 m</span></div>
        <div class="stat-item"><span class="stat-label">⏱️ Waktu</span><span class="stat-value" id="statTime">00:00</span></div>
        <div class="stat-item"><span class="stat-label">🚀 Kecepatan</span><span class="stat-value" id="statSpeed">0 km/j</span></div>
    </div>

    <!-- CONTROLS -->
    <div class="map-controls">
        <button class="btn-gps" onclick="locateMe()" title="Lokasi saya (G)"><i class="fas fa-location-arrow"></i> <span>GPS</span></button>
        <button class="btn-track" id="btnTrack" onclick="toggleTracking()" title="Rekam jejak (R)"><i class="fas fa-route"></i> <span id="trackText">Rekam</span></button>
        <button class="btn-compass" onclick="resetNorth()" title="Reset arah (N)"><i class="fas fa-compass"></i> <span>Utara</span></button>
        <button class="btn-save" onclick="saveTrack()" title="Simpan (S)"><i class="fas fa-save"></i> <span>Simpan</span></button>
        <button class="btn-export" onclick="showExportModal()" title="Export (E)"><i class="fas fa-download"></i> <span>Export</span></button>
        <button class="btn-draw" onclick="toggleDraw()" title="Gambar jalur (D)"><i class="fas fa-pen"></i> <span>Gambar</span></button>
        <button class="btn-clear" onclick="clearTrack()" title="Hapus (C)"><i class="fas fa-trash"></i> <span>Hapus</span></button>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <!-- MODAL EXPORT -->
    <div class="modal-overlay" id="exportModal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeExportModal()">&times;</button>
            <h2><i class="fas fa-download"></i> Export Jejak</h2>
            <p style="margin-bottom:16px;">Pilih format file untuk mengekspor jejak perjalanan Anda.</p>
            <div style="display:flex;flex-direction:column;gap:10px;">
                <button onclick="exportTrack('geojson')" class="modal-btn" style="background:#8b5cf6;"><i class="fas fa-globe"></i> GeoJSON</button>
                <button onclick="exportTrack('gpx')" class="modal-btn" style="background:#10b981;"><i class="fas fa-map"></i> GPX</button>
                <button onclick="exportTrack('kml')" class="modal-btn" style="background:#f59e0b;color:#1a1a2e;"><i class="fas fa-map-pin"></i> KML</button>
                <button onclick="exportTrack('csv')" class="modal-btn" style="background:#06b6d4;"><i class="fas fa-table"></i> CSV</button>
            </div>
        </div>
    </div>

    <!-- ============================================================
    SCRIPTS
    ============================================================ -->
    <!-- Leaflet & Plugins -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.fullscreen/2.0.0/Control.FullScreen.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-compass/1.2.4/leaflet.compass.min.js"></script>

    <!-- ============================================================
    SEMUA JAVASCRIPT LANGSUNG DI SINI (self-contained)
    ============================================================ -->
    <script>
        (function() {
            'use strict';

            // ============================================================
            // 1. INISIALISASI PETA
            // ============================================================
            const map = L.map('map', {
                center: [-7.5, 110.4],
                zoom: 8,
                fadeAnimation: true,
                attributionControl: true
            });

            // Base layers
            const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap',
                maxZoom: 19
            }).addTo(map);

            const topo = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenTopoMap',
                maxZoom: 17
            });

            const satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                attribution: '&copy; ESRI',
                maxZoom: 19
            });

            L.control.layers({
                '🗺️ Peta Dasar': osm,
                '🗻 Topografi': topo,
                '🛰️ Satelit': satellite
            }).addTo(map);

            // Compass (dengan fallback jika plugin gagal)
            try {
                L.control.compass({
                    position: 'topleft',
                    autoRotate: true,
                    showCompass: true,
                    showAngle: true
                }).addTo(map);
            } catch (e) {
                console.warn('⚠️ Kompas tidak tersedia:', e);
            }

            // Fullscreen control from plugin
            map.addControl(new L.Control.Fullscreen());

            // ============================================================
            // 2. VARIABEL GLOBAL
            // ============================================================
            let userMarker = null;
            let userCircle = null;
            let trackPoints = [];
            let trackLine = null;
            let isTracking = false;
            let watchId = null;
            let startTime = null;
            let totalDistance = 0;
            const drawnItems = L.featureGroup().addTo(map);
            let drawControl = null;
            let savedTracks = [];

            // ============================================================
            // 3. LOAD SAVED TRACKS
            // ============================================================
            try {
                const data = localStorage.getItem('mapatek_tracks');
                if (data) savedTracks = JSON.parse(data);
            } catch (e) { /* ignore */ }

            // ============================================================
            // 4. TOAST NOTIFICATION
            // ============================================================
            let toastTimeout;

            function showToast(msg, type) {
                const el = document.getElementById('toast');
                if (!el) return;
                el.textContent = msg;
                el.className = 'toast';
                if (type) el.classList.add(type);
                el.classList.add('show');
                clearTimeout(toastTimeout);
                toastTimeout = setTimeout(() => {
                    el.classList.remove('show');
                }, 4000);
            }

            // ============================================================
            // 5. GPS / LOCATE
            // ============================================================
            window.locateMe = function() {
                const status = document.getElementById('gpsStatus');
                const dot = document.getElementById('gpsDot');
                const text = document.getElementById('gpsText');
                const acc = document.getElementById('gpsAccuracy');

                status.classList.add('active');
                dot.className = 'dot off';
                text.textContent = 'Mengakses GPS...';
                acc.textContent = '';

                if (!navigator.geolocation) {
                    showToast('❌ Browser tidak mendukung GPS', 'error');
                    dot.className = 'dot off';
                    text.textContent = 'GPS tidak didukung';
                    return;
                }

                navigator.geolocation.getCurrentPosition(
                    function(pos) {
                        const lat = pos.coords.latitude;
                        const lng = pos.coords.longitude;
                        const accuracy = pos.coords.accuracy;
                        updateUserMarker(lat, lng, accuracy);
                        dot.className = 'dot on';
                        text.textContent = '📍 GPS Aktif';
                        acc.textContent = '±' + Math.round(accuracy) + 'm';
                        map.setView([lat, lng], 15);
                        showToast('✅ Lokasi ditemukan!', 'success');
                    },
                    function(err) {
                        console.warn('GPS error:', err);
                        dot.className = 'dot off';
                        text.textContent = '❌ Gagal akses GPS';
                        acc.textContent = '';
                        showToast('❌ Gagal akses GPS: ' + err.message, 'error');
                    },
                    { enableHighAccuracy: true, timeout: 15000, maximumAge: 5000 }
                );
            };

            function updateUserMarker(lat, lng, accuracy) {
                if (!userMarker) {
                    userMarker = L.marker([lat, lng], {
                        icon: L.divIcon({
                            className: 'user-marker',
                            html: '<div style="background:#3b82f6;width:16px;height:16px;border-radius:50%;border:3px solid #fff;box-shadow:0 0 30px rgba(59,130,246,0.5);"></div>',
                            iconSize: [16, 16],
                            iconAnchor: [8, 8]
                        })
                    }).addTo(map).bindPopup('📍 Anda di sini');
                    userCircle = L.circle([lat, lng], {
                        radius: accuracy || 20,
                        color: '#3b82f6',
                        fillColor: '#3b82f6',
                        fillOpacity: 0.15,
                        weight: 1
                    }).addTo(map);
                } else {
                    userMarker.setLatLng([lat, lng]);
                    userCircle.setLatLng([lat, lng]);
                    if (accuracy) userCircle.setRadius(accuracy);
                }
            }

            // ============================================================
            // 6. TRACKING
            // ============================================================
            window.toggleTracking = function() {
                isTracking = !isTracking;
                const btn = document.getElementById('btnTrack');
                const text = document.getElementById('trackText');
                if (isTracking) {
                    btn.classList.add('active');
                    text.textContent = 'Berhenti';
                    startTracking();
                    showToast('🟢 Memulai rekaman jejak...', 'success');
                } else {
                    btn.classList.remove('active');
                    text.textContent = 'Rekam';
                    stopTracking();
                    showToast('⏹️ Rekaman dihentikan (' + trackPoints.length + ' titik)', 'warning');
                }
            };

            function startTracking() {
                trackPoints = [];
                totalDistance = 0;
                startTime = Date.now();
                document.getElementById('statsPanel').classList.add('active');
                if (trackLine) { map.removeLayer(trackLine); trackLine = null; }

                if (!navigator.geolocation) {
                    showToast('❌ GPS tidak tersedia', 'error');
                    isTracking = false;
                    return;
                }

                watchId = navigator.geolocation.watchPosition(
                    function(pos) {
                        const lat = pos.coords.latitude;
                        const lng = pos.coords.longitude;
                        const acc = pos.coords.accuracy;
                        trackPoints.push([lat, lng]);
                        updateUserMarker(lat, lng, acc);
                        updateStats();

                        if (trackLine) map.removeLayer(trackLine);
                        trackLine = L.polyline(trackPoints, {
                            color: '#10b981',
                            weight: 4,
                            opacity: 0.9,
                            smoothFactor: 1
                        }).addTo(map);

                        document.getElementById('gpsText').textContent = '📍 Tracking ' + trackPoints.length + ' titik';
                        document.getElementById('gpsAccuracy').textContent = '±' + Math.round(acc) + 'm';
                    },
                    function(err) {
                        console.warn('Tracking error:', err);
                        showToast('❌ Error tracking: ' + err.message, 'error');
                    },
                    { enableHighAccuracy: true, timeout: 5000, maximumAge: 3000 }
                );
            }

            function stopTracking() {
                if (watchId) {
                    navigator.geolocation.clearWatch(watchId);
                    watchId = null;
                }
                if (trackPoints.length < 2) {
                    document.getElementById('statsPanel').classList.remove('active');
                }
            }

            // ============================================================
            // 7. STATISTICS
            // ============================================================
            function updateStats() {
                document.getElementById('statPoints').textContent = trackPoints.length;
                let dist = 0;
                for (let i = 1; i < trackPoints.length; i++) {
                    const p1 = trackPoints[i-1];
                    const p2 = trackPoints[i];
                    dist += distance(p1[0], p1[1], p2[0], p2[1]);
                }
                totalDistance = dist;
                document.getElementById('statDistance').textContent = formatDistance(dist);

                const elapsed = (Date.now() - startTime) / 1000;
                document.getElementById('statTime').textContent = formatTime(elapsed);
                if (elapsed > 0) {
                    const speed = (dist / 1000) / (elapsed / 3600);
                    document.getElementById('statSpeed').textContent = speed.toFixed(1) + ' km/j';
                }
            }

            function distance(lat1, lon1, lat2, lon2) {
                const R = 6371000;
                const dLat = (lat2 - lat1) * Math.PI / 180;
                const dLon = (lon2 - lon1) * Math.PI / 180;
                const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                        Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                        Math.sin(dLon/2) * Math.sin(dLon/2);
                const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
                return R * c;
            }

            function formatDistance(m) {
                if (m < 1000) return Math.round(m) + ' m';
                return (m / 1000).toFixed(2) + ' km';
            }

            function formatTime(s) {
                const h = Math.floor(s / 3600);
                const m = Math.floor((s % 3600) / 60);
                const sec = Math.floor(s % 60);
                if (h > 0) return h + ':' + String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
                return String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
            }

            // ============================================================
            // 8. SAVE TRACK
            // ============================================================
            window.saveTrack = function() {
                if (trackPoints.length < 2) {
                    showToast('⚠️ Belum ada jejak untuk disimpan!', 'warning');
                    return;
                }
                const data = {
                    id: Date.now(),
                    name: 'Jejak ' + new Date().toLocaleDateString('id-ID'),
                    points: trackPoints.slice(),
                    date: new Date().toISOString(),
                    count: trackPoints.length,
                    distance: totalDistance,
                    duration: (Date.now() - startTime) / 1000
                };
                try {
                    savedTracks.push(data);
                    localStorage.setItem('mapatek_tracks', JSON.stringify(savedTracks));
                    showToast('✅ Jejak tersimpan! (' + trackPoints.length + ' titik)', 'success');
                } catch (e) {
                    showToast('❌ Gagal menyimpan: ' + e.message, 'error');
                }
            };

            // ============================================================
            // 9. EXPORT
            // ============================================================
            window.showExportModal = function() {
                if (trackPoints.length < 2) {
                    showToast('⚠️ Belum ada jejak untuk diekspor!', 'warning');
                    return;
                }
                document.getElementById('exportModal').classList.add('active');
            };

            window.closeExportModal = function() {
                document.getElementById('exportModal').classList.remove('active');
            };

            window.exportTrack = function(format) {
                closeExportModal();
                if (trackPoints.length < 2) {
                    showToast('⚠️ Belum ada jejak!', 'warning');
                    return;
                }
                let content, filename, mimeType;
                const coords = trackPoints.map(p => [p[1], p[0]]);

                switch(format) {
                    case 'geojson':
                        content = JSON.stringify({
                            type: "Feature",
                            properties: { name: "Jejak MAPATEK", date: new Date().toISOString(), points: trackPoints.length },
                            geometry: { type: "LineString", coordinates: coords }
                        }, null, 2);
                        filename = 'jejak_mapatek.geojson';
                        mimeType = 'application/json';
                        break;
                    case 'gpx':
                        content = generateGPX(trackPoints);
                        filename = 'jejak_mapatek.gpx';
                        mimeType = 'application/gpx+xml';
                        break;
                    case 'kml':
                        content = generateKML(trackPoints);
                        filename = 'jejak_mapatek.kml';
                        mimeType = 'application/vnd.google-earth.kml+xml';
                        break;
                    case 'csv':
                        content = 'lat,lng,alt\n' + trackPoints.map(p => p[0] + ',' + p[1] + ',0').join('\n');
                        filename = 'jejak_mapatek.csv';
                        mimeType = 'text/csv';
                        break;
                    default:
                        showToast('Format tidak dikenal', 'error');
                        return;
                }

                const blob = new Blob([content], { type: mimeType });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                showToast('📥 File ' + filename + ' siap diunduh!', 'success');
            };

            function generateGPX(points) {
                const now = new Date().toISOString();
                let gpx = '<?xml version="1.0" encoding="UTF-8"?>\n<gpx version="1.1" creator="MAPATEK" xmlns="http://www.topografix.com/GPX/1/1">\n';
                gpx += '  <metadata><time>' + now + '</time><desc>Jejak pendakian MAPATEK</desc></metadata>\n';
                gpx += '  <trk><name>Jejak MAPATEK</name><trkseg>\n';
                points.forEach(p => {
                    gpx += '      <trkpt lat="' + p[0] + '" lon="' + p[1] + '"><ele>0</ele><time>' + now + '</time></trkpt>\n';
                });
                gpx += '    </trkseg></trk>\n</gpx>';
                return gpx;
            }

            function generateKML(points) {
                const coords = points.map(p => p[1] + ',' + p[0] + ',0').join(' ');
                return '<?xml version="1.0" encoding="UTF-8"?>\n<kml xmlns="http://www.opengis.net/kml/2.2">\n' +
                       '  <Document><name>Jejak MAPATEK</name>\n' +
                       '    <Placemark><name>Jejak Pendakian</name>\n' +
                       '      <LineString><coordinates>' + coords + '</coordinates></LineString>\n' +
                       '    </Placemark>\n' +
                       '  </Document>\n</kml>';
            }

            // ============================================================
            // 10. CLEAR TRACK
            // ============================================================
            window.clearTrack = function() {
                if (trackPoints.length === 0) {
                    showToast('ℹ️ Tidak ada jejak', 'warning');
                    return;
                }
                if (confirm('Hapus semua jejak yang terekam?')) {
                    trackPoints = [];
                    totalDistance = 0;
                    if (trackLine) { map.removeLayer(trackLine); trackLine = null; }
                    document.getElementById('statsPanel').classList.remove('active');
                    document.getElementById('gpsText').textContent = '📍 GPS Aktif';
                    showToast('🗑️ Jejak dihapus', 'warning');
                }
            };

            // ============================================================
            // 11. DRAW TOOLS
            // ============================================================
            window.toggleDraw = function() {
                if (drawControl) {
                    map.removeControl(drawControl);
                    drawControl = null;
                    showToast('✏️ Mode gambar dinonaktifkan', 'warning');
                } else {
                    drawControl = new L.Control.Draw({
                        position: 'topleft',
                        draw: {
                            polyline: { shapeOptions: { color: '#f472b6', weight: 4 } },
                            polygon: false,
                            rectangle: false,
                            circle: false,
                            marker: true
                        },
                        edit: { featureGroup: drawnItems, remove: true }
                    });
                    map.addControl(drawControl);
                    showToast('✏️ Klik pada peta untuk menggambar jalur', 'success');
                }
            };

            map.on(L.Draw.Event.CREATED, function(e) {
                const layer = e.layer;
                drawnItems.addLayer(layer);
                if (layer instanceof L.Polyline) {
                    const latlngs = layer.getLatLngs();
                    trackPoints = latlngs.map(ll => [ll.lat, ll.lng]);
                    totalDistance = 0;
                    for (let i = 1; i < trackPoints.length; i++) {
                        totalDistance += distance(trackPoints[i-1][0], trackPoints[i-1][1],
                                                  trackPoints[i][0], trackPoints[i][1]);
                    }
                    document.getElementById('statsPanel').classList.add('active');
                    document.getElementById('statPoints').textContent = trackPoints.length;
                    document.getElementById('statDistance').textContent = formatDistance(totalDistance);
                    showToast('✅ Jalur digambar: ' + trackPoints.length + ' titik', 'success');
                }
            });

            map.on(L.Draw.Event.DELETED, function() {
                if (drawnItems.getLayers().length === 0) {
                    trackPoints = [];
                    document.getElementById('statsPanel').classList.remove('active');
                }
            });

            // ============================================================
            // 12. COMPASS / NORTH
            // ============================================================
            window.resetNorth = function() {
                map.setView(map.getCenter(), map.getZoom());
                showToast('🧭 Arah Utara direset', 'success');
            };

            // ============================================================
            // 13. FULLSCREEN
            // ============================================================
            window.toggleFullscreen = function() {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen();
                    showToast('⛶ Mode layar penuh', 'success');
                } else {
                    document.exitFullscreen();
                    showToast('⛶ Keluar layar penuh', 'warning');
                }
            };

            // ============================================================
            // 14. KEYBOARD SHORTCUTS
            // ============================================================
            document.addEventListener('keydown', function(e) {
                if (e.target.tagName === 'INPUT') return;
                switch(e.key.toLowerCase()) {
                    case 'g': locateMe(); e.preventDefault(); break;
                    case 'r': toggleTracking(); e.preventDefault(); break;
                    case 's': saveTrack(); e.preventDefault(); break;
                    case 'e': showExportModal(); e.preventDefault(); break;
                    case 'c': clearTrack(); e.preventDefault(); break;
                    case 'd': toggleDraw(); e.preventDefault(); break;
                    case 'n': resetNorth(); e.preventDefault(); break;
                    case 'f': toggleFullscreen(); e.preventDefault(); break;
                }
            });

            // ============================================================
            // 15. LOAD JALUR PENDAKIAN (dari data/jalur-pendakian.geojson)
            // ============================================================
            function popupJalur(props) {
                let html = '<b>🏔️ ' + (props.name || 'Jalur Pendakian') + '</b>';
                if (props.difficulty) html += '<br>Kesulitan: ' + props.difficulty;
                if (props.duration) html += '<br>Durasi: ' + props.duration;
                if (props.elevation) html += '<br>Elevasi: ' + props.elevation;
                return html;
            }

            function loadSampleRoute() {
                // Fallback minimal jika data/jalur-pendakian.geojson gagal dimuat
                const fallbackRoute = {
                    "type": "Feature",
                    "properties": { "name": "Jalur Pendakian Gunung Merbabu" },
                    "geometry": {
                        "type": "LineString",
                        "coordinates": [
                            [110.4328, -7.4517], [110.4350, -7.4550], [110.4380, -7.4600],
                            [110.4400, -7.4650], [110.4420, -7.4700], [110.4450, -7.4750],
                            [110.4480, -7.4800], [110.4500, -7.4850]
                        ]
                    }
                };

                fetch('data/jalur-pendakian.geojson')
                    .then(function(res) {
                        if (!res.ok) throw new Error('HTTP ' + res.status);
                        return res.json();
                    })
                    .then(function(data) {
                        L.geoJSON(data, {
                            style: { color: '#ff7800', weight: 4, dashArray: '8,6' },
                            onEachFeature: function(f, layer) {
                                layer.bindPopup(popupJalur(f.properties || {}));
                            }
                        }).addTo(map);
                        console.log('✅ Jalur pendakian dimuat dari data/jalur-pendakian.geojson');
                    })
                    .catch(function(err) {
                        console.warn('⚠️ Gagal memuat data/jalur-pendakian.geojson, pakai rute contoh:', err);
                        L.geoJSON(fallbackRoute, {
                            style: { color: '#ff7800', weight: 4, dashArray: '8,6' },
                            onEachFeature: function(f, layer) {
                                layer.bindPopup(popupJalur(f.properties || {}));
                            }
                        }).addTo(map);
                    });
            }

            // ============================================================
            // 16. SERVICE WORKER (OFFLINE)
            // ============================================================
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js')
                    .then(() => console.log('✅ Service Worker terdaftar'))
                    .catch(err => console.warn('⚠️ Service Worker gagal:', err));
            }

            // ============================================================
            // 17. INIT
            // ============================================================
            window.addEventListener('load', function() {
                showToast('🗺️ Peta Pendakian MAPATEK siap!', 'success');
                setTimeout(locateMe, 1200);
                setTimeout(loadSampleRoute, 500);
                console.log('✅ Peta siap! Shortcut: G,R,S,E,C,D,N,F');
            });

            // Ekspos showToast ke global (opsional)
            window.showToast = showToast;

        })();
    </script>
</body>
</html>
